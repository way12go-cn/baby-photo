<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝成长相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
        }

        /* 密码弹窗 */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .password-box {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .password-box h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 18px;
        }

        .password-box input {
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
            width: 200px;
            outline: none;
        }

        .password-box button {
            padding: 10px 20px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .password-box button:hover {
            background: #337ecc;
        }

        .error {
            color: #f56c6c;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        /* 相册容器 */
        .gallery-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }

        .gallery {
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s ease;
        }

        .gallery img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            flex-shrink: 0;
            background: #000;
            loading: lazy;
        }

        /* 导航按钮 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* 全屏按钮 */
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* 计数器 */
        .counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <!-- 密码验证 -->
    <div class="password-modal" id="passwordModal">
        <div class="password-box">
            <h2>请输入相册密码</h2>
            <input type="password" id="passwordInput" placeholder="输入密码">
            <button onclick="checkPassword()">确认</button>
            <div class="error" id="errorTip">密码错误，请重试</div>
        </div>
    </div>

    <!-- 相册主体 -->
    <div class="gallery-container" id="galleryContainer">
        <div class="gallery" id="gallery">
            <!-- 👇 所有图片已替换为国内加速镜像 -->
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/1.jpg" alt="宝宝照片" data-index="0">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/2.jpg" alt="宝宝照片" data-index="1">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/3.jpg" alt="宝宝照片" data-index="2">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/4.jpg" alt="宝宝照片" data-index="3">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/5.jpg" alt="宝宝照片" data-index="4">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/6.jpg" alt="宝宝照片" data-index="5">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/7.jpg" alt="宝宝照片" data-index="6">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/8.jpg" alt="宝宝照片" data-index="7">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/9.jpg" alt="宝宝照片" data-index="8">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/10.jpg" alt="宝宝照片" data-index="9">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/11.jpg" alt="宝宝照片" data-index="10">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/12.jpg" alt="宝宝照片" data-index="11">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/13.jpg" alt="宝宝照片" data-index="12">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/14.jpg" alt="宝宝照片" data-index="13">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/15.jpg" alt="宝宝照片" data-index="14">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/16.jpg" alt="宝宝照片" data-index="15">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/17.jpg" alt="宝宝照片" data-index="16">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/18.jpg" alt="宝宝照片" data-index="17">
            <img src="https://fastly.jsdelivr.net/gh/way12go-cn/baby-photo@main/19.jpg" alt="宝宝照片" data-index="18">
        </div>

        <button class="nav-btn prev" onclick="prevImg()">&lt;</button>
        <button class="nav-btn next" onclick="nextImg()">&gt;</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        <div class="counter" id="counter">1 / 19</div>
    </div>

    <script>
        // 配置
        const CORRECT_PASSWORD = "123456"; // 可自行修改密码
        const COOKIE_EXPIRE = 1; // 免登录天数：1天
        let currentIndex = 0;
        const gallery = document.getElementById('gallery');
        const totalImages = document.querySelectorAll('#gallery img').length;

        // 密码验证
        function checkPassword() {
            const input = document.getElementById('passwordInput').value.trim();
            const errorTip = document.getElementById('errorTip');
            
            if (input === CORRECT_PASSWORD) {
                // 设置Cookie，24小时免密
                const date = new Date();
                date.setTime(date.getTime() + (COOKIE_EXPIRE * 24 * 60 * 60 * 1000));
                document.cookie = `album_auth=success; expires=${date.toUTCString()}; path=/`;
                
                document.getElementById('passwordModal').style.display = 'none';
                document.getElementById('galleryContainer').style.display = 'block';
            } else {
                errorTip.style.display = 'block';
            }
        }

        // 页面加载检查Cookie
        window.onload = function() {
            if (document.cookie.includes('album_auth=success')) {
                document.getElementById('passwordModal').style.display = 'none';
                document.getElementById('galleryContainer').style.display = 'block';
            }
        }

        // 上一张
        function prevImg() {
            currentIndex = (currentIndex - 1 + totalImages) % totalImages;
            updateGallery();
        }

        // 下一张
        function nextImg() {
            currentIndex = (currentIndex + 1) % totalImages;
            updateGallery();
        }

        // 更新相册
        function updateGallery() {
            gallery.style.transform = `translateX(-${currentIndex * 100}vw)`;
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${totalImages}`;
        }

        // 全屏切换
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                document.exitFullscreen();
            }
        }

        // 键盘/手势控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevImg();
            if (e.key === 'ArrowRight') nextImg();
        });

        // 触摸滑动
        let startX = 0;
        document.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) nextImg();
            if (endX - startX > 50) prevImg();
        });
    </script>
</body>
</html>
