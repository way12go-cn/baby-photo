<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026/03/15 宝宝28天摄影图集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        /* 黑色背景 */
        body {
            background-color: #000;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 密码弹窗样式 */
        .password-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .password-box h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
            text-align: center;
        }

        .password-box input {
            padding: 12px 15px;
            font-size: 16px;
            width: 100%;
            max-width: 250px;
            margin: 10px 0;
            border: 1px solid #666;
            border-radius: 5px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
            background: #222;
            color: #fff;
        }

        .password-box input.error {
            border-color: #dc3545;
            box-shadow: 0 0 0 2px rgba(220, 53, 69, 0.1);
        }

        .error-tip {
            color: #dc3545;
            font-size: 14px;
            margin: 5px 0 15px;
            height: 18px;
            visibility: hidden;
        }

        .error-tip.show {
            visibility: visible;
        }

        .password-box button {
            padding: 12px 30px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            width: 100%;
            max-width: 250px;
        }

        .password-box button:hover {
            background: #0056b3;
        }

        /* 标题样式 */
        .title {
            text-align: center;
            margin: 30px 0;
            color: #fff;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 600;
        }

        /* 相册布局 - 手机每行2张 */
        .gallery {
            display: grid;
            /* 强制手机每行2张，大屏也保持2张更协调 */
            grid-template-columns: repeat(auto-fill, minmax(calc(50% - 7.5px), 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 10px;
        }

        /* 预览图裁剪 - 面部优先（object-position:center 优先显示中心区域） */
        .gallery img {
            width: 100%;
            height: 250px; /* 增加高度提升预览体验 */
            object-fit: cover;
            object-position: center; /* 优先显示中心区域（面部优先） */
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 2px 5px rgba(255,255,255,0.1);
            loading: lazy;
        }

        .gallery img:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        /* 预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 95%;
            max-height: 90vh;
            border-radius: 5px;
            object-fit: contain; /* 大图完整显示 */
        }

        /* 关闭按钮 */
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 1000;
            user-select: none;
        }

        .close:hover {
            color: #ddd;
        }

        /* 切换按钮 */
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 50px;
            cursor: pointer;
            padding: 0 20px;
            transition: color 0.3s;
            user-select: none;
            opacity: 0.8;
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        .modal-nav:hover {
            color: #fff;
            opacity: 1;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .close {
                font-size: 30px;
                top: 15px;
                right: 20px;
            }

            .modal-nav {
                font-size: 35px;
                padding: 0 10px;
            }

            .gallery {
                gap: 10px;
            }

            .gallery img {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- 密码输入框 -->
    <div class="password-box" id="passwordBox">
        <h2>请输入密码查看宝宝照片</h2>
        <input type="password" id="passwordInput" placeholder="输入密码">
        <div class="error-tip" id="errorTip">密码错误，请重新输入</div>
        <button id="confirmBtn">确认</button>
    </div>

    <h1 class="title">2026/03/15 宝宝28天摄影图集</h1>
    
    <div class="gallery" id="gallery">
        <!-- 使用jsDelivr加速，替换为你的GitHub仓库路径（需要先把照片上传到GitHub） -->
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/1.jpg" alt="宝宝28天拍摄作品1" data-index="0">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/2.jpg" alt="宝宝28天拍摄作品2" data-index="1">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/3.jpg" alt="宝宝28天拍摄作品3" data-index="2">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/4.jpg" alt="宝宝28天拍摄作品4" data-index="3">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/5.jpg" alt="宝宝28天拍摄作品5" data-index="4">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/6.jpg" alt="宝宝28天拍摄作品6" data-index="5">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/7.jpg" alt="宝宝28天拍摄作品7" data-index="6">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/8.jpg" alt="宝宝28天拍摄作品8" data-index="7">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/9.jpg" alt="宝宝28天拍摄作品9" data-index="8">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/10.jpg" alt="宝宝28天拍摄作品10" data-index="9">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/11.jpg" alt="宝宝28天拍摄作品11" data-index="10">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/12.jpg" alt="宝宝28天拍摄作品12" data-index="11">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/13.jpg" alt="宝宝28天拍摄作品13" data-index="12">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/14.jpg" alt="宝宝28天拍摄作品14" data-index="13">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/15.jpg" alt="宝宝28天拍摄作品15" data-index="14">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/16.jpg" alt="宝宝28天拍摄作品16" data-index="15">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/17.jpg" alt="宝宝28天拍摄作品17" data-index="16">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/18.jpg" alt="宝宝28天拍摄作品18" data-index="17">
        <img src="https://cdn.jsdelivr.net/gh/way12go-cn/photo-album@main/19.jpg" alt="宝宝28天拍摄作品19" data-index="18">
    </div>

    <div class="modal" id="modal">
        <span class="close" id="closeBtn" aria-label="关闭预览">×</span>
        <span class="modal-nav prev-btn" id="prevBtn" aria-label="上一张">❮</span>
        <span class="modal-nav next-btn" id="nextBtn" aria-label="下一张">❯</span>
        <img src="" class="modal-content" id="modalImg">
    </div>

    <script>
        // 配置项
        const correctPassword = "260315"; // 修改后的密码
        const COOKIE_NAME = "album_password_valid";
        const COOKIE_EXPIRE_HOURS = 24; // 24小时免密

        // 获取DOM元素
        const passwordBox = document.getElementById('passwordBox');
        const passwordInput = document.getElementById('passwordInput');
        const errorTip = document.getElementById('errorTip');
        const confirmBtn = document.getElementById('confirmBtn');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const closeBtn = document.getElementById('closeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const galleryImgs = document.querySelectorAll('.gallery img');
        let currentImgIndex = 0;

        // ------------- Cookie 操作函数 -------------
        // 设置Cookie
        function setCookie(name, value, hours) {
            const date = new Date();
            date.setTime(date.getTime() + (hours * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = `${name}=${value}; ${expires}; path=/; SameSite=Lax`;
        }

        // 获取Cookie
        function getCookie(name) {
            const nameEQ = `${name}=`;
            const ca = document.cookie.split(';');
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // 检查是否已登录（24小时内）
        function checkValidCookie() {
            const cookieValue = getCookie(COOKIE_NAME);
            return cookieValue === correctPassword;
        }

        // ------------- 密码验证 -------------
        function checkPassword() {
            const inputVal = passwordInput.value.trim();
            passwordInput.classList.remove('error');
            errorTip.classList.remove('show');

            if (!inputVal) {
                errorTip.textContent = '请输入密码后再提交';
                passwordInput.classList.add('error');
                errorTip.classList.add('show');
                passwordInput.focus();
                return;
            }

            if (inputVal === correctPassword) {
                // 设置24小时免密Cookie
                setCookie(COOKIE_NAME, correctPassword, COOKIE_EXPIRE_HOURS);
                passwordBox.style.display = 'none';
                initGalleryClick();
            } else {
                passwordInput.classList.add('error');
                errorTip.textContent = '密码错误，请重新输入';
                errorTip.classList.add('show');
                passwordInput.select();
            }
        }

        // ------------- 相册功能 -------------
        function initGalleryClick() {
            galleryImgs.forEach(img => {
                img.addEventListener('click', function() {
                    currentImgIndex = parseInt(this.dataset.index);
                    modal.style.display = 'flex';
                    modalImg.src = this.src;
                });
            });
        }

        function showPrevImg() {
            currentImgIndex = (currentImgIndex - 1 + galleryImgs.length) % galleryImgs.length;
            modalImg.src = galleryImgs[currentImgIndex].src;
        }

        function showNextImg() {
            currentImgIndex = (currentImgIndex + 1) % galleryImgs.length;
            modalImg.src = galleryImgs[currentImgIndex].src;
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function handleModalClick(e) {
            if (e.target === modal) {
                closeModal();
            }
        }

        // ------------- 初始化 -------------
        // 检查Cookie，有效则直接解锁
        if (checkValidCookie()) {
            passwordBox.style.display = 'none';
            initGalleryClick();
        }

        // 绑定事件
        confirmBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
        closeBtn.addEventListener('click', closeModal);
        prevBtn.addEventListener('click', showPrevImg);
        nextBtn.addEventListener('click', showNextImg);
        modal.addEventListener('click', handleModalClick);
        
        // 键盘操作
        document.addEventListener('keydown', function(e) {
            if (modal.style.display === 'flex') {
                switch(e.key) {
                    case 'ArrowLeft': showPrevImg(); break;
                    case 'ArrowRight': showNextImg(); break;
                    case 'Escape': closeModal(); break;
                }
            }
        });
    </script>
</body>
</html>
