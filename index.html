<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年3月15日 宝宝28天拍摄作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        /* 密码弹窗样式 */
        .password-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .password-box input {
            padding: 12px 15px;
            font-size: 16px;
            width: 250px;
            margin: 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        .password-box button {
            padding: 12px 30px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .title {
            text-align: center;
            margin: 30px 0;
            color: #333;
            font-size: 28px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 5px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 密码输入框 -->
    <div class="password-box" id="passwordBox">
        <h2>请输入密码查看宝宝照片</h2>
        <input type="password" id="passwordInput" placeholder="输入密码">
        <button onclick="checkPassword()">确认</button>
    </div>

    <h1 class="title">2026年3月15日 宝宝28天拍摄作品集</h1>
    
    <div class="gallery">
        <img src="1.jpg" alt="摄影作品1">
        <img src="2.jpg" alt="摄影作品2">
        <img src="3.jpg" alt="摄影作品3">
        <img src="4.jpg" alt="摄影作品4">
        <img src="5.jpg" alt="摄影作品5">
        <img src="6.jpg" alt="摄影作品6">
        <img src="7.jpg" alt="摄影作品7">
        <img src="8.jpg" alt="摄影作品8">
        <img src="9.jpg" alt="摄影作品9">
        <img src="10.jpg" alt="摄影作品10">
        <img src="11.jpg" alt="摄影作品11">
        <img src="12.jpg" alt="摄影作品12">
        <img src="13.jpg" alt="摄影作品13">
        <img src="14.jpg" alt="摄影作品14">
        <img src="15.jpg" alt="摄影作品15">
        <img src="16.jpg" alt="摄影作品16">
        <img src="17.jpg" alt="摄影作品17">
        <img src="18.jpg" alt="摄影作品18">
        <img src="19.jpg" alt="摄影作品19">
    </div>

    <div class="modal" id="modal">
        <span class="close">&times;</span>
        <img src="" class="modal-content" id="modalImg">
    </div>

    <script>
        // 🔑 这里改密码！默认：20260315
        const correctPassword = "20260315";

        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            if (input === correctPassword) {
                document.getElementById("passwordBox").style.display = "none";
            } else {
                alert("密码错误，请重新输入！");
            }
        }

        // 图片放大功能
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modalImg");
        const images = document.querySelectorAll(".gallery img");
        const closeBtn = document.querySelector(".close");

        images.forEach(img => {
            img.onclick = function(){
                modal.style.display = "flex";
                modalImg.src = this.src;
            }
        });

        closeBtn.onclick = function(){
            modal.style.display = "none";
        }

        modal.onclick = function(e){
            if(e.target === modal){
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
